[metadata]
name = "no-sensitive-paths"
version = "1.0"

[[rules]]
id = "block-etc-access"
tool = "read_file"
condition = "arguments.path matches '^/etc/(passwd|shadow|sudoers)'"
action = "deny"
message = "Access to sensitive system files is not permitted"

[[rules]]
id = "block-ssh-keys"
tool = "read_file"
condition = "arguments.path matches '\\.ssh/(id_rsa|id_ed25519|authorized_keys)'"
action = "deny"
message = "Access to SSH key files is not permitted"

[[rules]]
id = "block-env-files"
tool = "read_file"
condition = "arguments.path matches '(\\.env|\\.env\\.local|\\.env\\.production)$'"
action = "deny"
message = "Access to environment variable files is not permitted"
