[metadata]
name = "redact-api-keys"
version = "1.0"

[[rules]]
id = "redact-openai-key"
tool = "*"
condition = "arguments contains_pattern 'sk-[a-zA-Z0-9]{20,}'"
action = "redact"
pattern = "sk-[a-zA-Z0-9]{20,}"
replacement = "[OPENAI_KEY]"

[[rules]]
id = "redact-github-token"
tool = "*"
condition = "arguments contains_pattern 'ghp_[a-zA-Z0-9]+'"
action = "redact"
pattern = "ghp_[a-zA-Z0-9]+"
replacement = "[GITHUB_TOKEN]"

[[rules]]
id = "redact-aws-key"
tool = "*"
condition = "arguments contains_pattern 'AKIA[0-9A-Z]{16}'"
action = "redact"
pattern = "AKIA[0-9A-Z]{16}"
replacement = "[AWS_ACCESS_KEY]"

[[rules]]
id = "redact-slack-token"
tool = "*"
condition = "arguments contains_pattern 'xoxb-[0-9]+-[0-9]+-[a-zA-Z0-9]+'"
action = "redact"
pattern = "xoxb-[0-9]+-[0-9]+-[a-zA-Z0-9]+"
replacement = "[SLACK_TOKEN]"
